name: guards
on: [push, pull_request]
jobs:
  scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: secret-scan (tree)
        run: sh scripts/secret-scan.sh tree
      - name: phi-scan (tree)
        run: sh scripts/phi-scan.sh tree
      # Law 2 applied to the verifier itself: a tool that has only ever been observed
      # passing is a decoration. This tree has shipped two such gates already.
      - name: verify-l1 selftest (the verifier must be watched biting)
        run: sh verify/verify-l1.sh selftest
  cargo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build
        run: cargo build --workspace
      - name: test
        run: cargo test --workspace
      - name: fmt
        run: cargo fmt --all --check
