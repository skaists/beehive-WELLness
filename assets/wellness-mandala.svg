  <title>beehive-WELLness mark</title>
  <desc>The beehive-WELLness mark: sovereign-purple core, through blue and teal, to a lime-biomass rim - the biomass to machine to sovereign climb the tree is for. A recolor of the shared skaists mandala geometry (bnr-design @ cdee76a); one geometry, a colorway. Pairs with a separate wordmark, never text on the mandala.</desc>
